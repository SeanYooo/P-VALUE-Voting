<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superadmin Voting Terminal</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #f8fafc; padding: 30px; }
        .admin-box { max-width: 900px; margin: 0 auto; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background: #0ea5e9; }
        .results-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .tally-card { background: #1e293b; padding: 20px; border-radius: 8px; border: 1px solid #334155; }
        h3 { color: #38bdf8; margin-bottom: 15px; border-bottom: 1px solid #475569; padding-bottom: 5px; }
        .tally-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #334155; }
        .count-badge { background: #38bdf8; color: #0f172a; padding: 2px 10px; border-radius: 12px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #1e293b; color: #94a3b8; }
    </style>
</head>
<body>

    <div class="admin-box">
        <div class="header-row">
            <h2>Superadmin Tally & Verification Command Control</h2>
            <button onclick="fetchDatabaseData()">Refresh Live Audit Logs</button>
        </div>

        <!-- Real Tally Tables -->
        <div class="results-container">
            <div class="tally-card">
                <h3>President Tally Results</h3>
                <div id="presidentTally">Click refresh to load...</div>
            </div>
            
            <div class="tally-card">
                <h3>Representative Tally Results</h3>
                <div id="repTally">Click refresh to load...</div>
            </div>
        </div>

        <h3>Raw Audit Ledger Logs</h3>
        <table id="auditTable">
            <thead>
                <tr>
                    <th>LRN</th>
                    <th>Last Name</th>
                    <th>Track</th>
                    <th>Section</th>
                    <th>President Vote</th>
                    <th>Representative Vote</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="6" style="text-align:center; color:#94a3b8;">No records loaded. Click Refresh above.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxC5UUirKQ23Nh4N3daTklJKuJxOZa3CkWMV97BT792_zJk8Let4-s4JGNzAAadjhG3/exec";

        function fetchDatabaseData() {
            fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                processTally(data);
                renderAuditTable(data);
            })
            .catch(err => alert("Error pulling down data ledger: " + err));
        }

        function processTally(data) {
            let presCounts = {};
            let repCounts = {};

            data.forEach(item => {
                // Tally Presidents
                if(item.president) {
                    presCounts[item.president] = (presCounts[item.president] || 0) + 1;
                }
                // Tally Representatives
                if(item.representative) {
                    repCounts[item.representative] = (repCounts[item.representative] || 0) + 1;
                }
            });

            // Render President Box UI
            const presBox = document.getElementById('presidentTally');
            presBox.innerHTML = '';
            for (let k in presCounts) {
                presBox.innerHTML += `<div class="tally-item"><span>${k}</span><span class="count-badge">${presCounts[k]}</span></div>`;
            }

            // Render Rep Box UI
            const repBox = document.getElementById('repTally');
            repBox.innerHTML = '';
            for (let k in repCounts) {
                repBox.innerHTML += `<div class="tally-item"><span>${k}</span><span class="count-badge">${repCounts[k]}</span></div>`;
            }
        }

        function renderAuditTable(data) {
            const tbody = document.querySelector('#auditTable tbody');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No entries found in ledger.</td></tr>';
                return;
            }

            data.forEach(item => {
                let row = `<tr>
                    <td>${item.lrn}</td>
                    <td>${item.lastName}</td>
                    <td>${item.track}</td>
                    <td>${item.section}</td>
                    <td>${item.president}</td>
                    <td>${item.representative}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
